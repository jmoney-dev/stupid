<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #9c9c9c 0%, #6f6f6f 100%);
            background-size: 400% 400%;
            animation: stupidBgShift 8s ease infinite, stupidBounce 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            flex-direction: column;
            gap: 10px;
            padding: 38px 0 0 44px;
        }

        body.shake {
            animation: stupidBgShift 8s ease infinite, stupidBounce 4s ease-in-out infinite, mlgShake 0.2s linear;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.08) 0,
                rgba(255, 255, 255, 0.08) 18px,
                rgba(0, 0, 0, 0.08) 18px,
                rgba(0, 0, 0, 0.08) 36px
            );
            animation: stupidRotate 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes stupidBgShift {
            0% {
                background-position: 0% 50%;
                filter: hue-rotate(0deg);
            }
            25% {
                background-position: 100% 50%;
                filter: hue-rotate(45deg);
            }
            50% {
                background-position: 100% 100%;
                filter: hue-rotate(90deg);
            }
            75% {
                background-position: 0% 100%;
                filter: hue-rotate(45deg);
            }
            100% {
                background-position: 0% 50%;
                filter: hue-rotate(0deg);
            }
        }

        @keyframes stupidRotate {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.2);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        @keyframes stupidBounce {
            0%, 100% {
                transform: scaleY(1);
            }
            50% {
                transform: scaleY(1.05);
            }
        }

        .count-display {
            font-size: clamp(170px, 28vw, 390px);
            font-weight: bold;
            color: #ffea00;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 4px 4px 0 #000;
            background: transparent;
            border: 0;
            padding: 0;
            margin-left: 78px;
            margin-top: -10px;
            transform: rotate(-2deg);
        }

        .counter-label {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000;
            background: #ff3d00;
            border: 3px solid #000;
            padding: 8px 12px;
            margin-left: 18px;
            transform: rotate(1deg);
        }

        .step-unit {
            color: #111;
            font-size: 52px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: -58px;
            margin-left: 320px;
            background: transparent;
            border: 0;
            padding: 0;
            transform: rotate(-4deg);
            text-shadow: 2px 2px 0 #fff;
        }

        .step-cluster {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 3;
            width: 220px;
            height: 260px;
        }

        .plus-btn {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            font-size: 58px;
            background-color: #18a600;
            color: white;
            border: 6px solid #000;
            cursor: pointer;
            box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.6);
            font-weight: bold;
            transition: all 0.2s ease;
            letter-spacing: 2px;
            z-index: 3;
        }

        .plus-btn:hover {
            background-color: #149000;
            transform: scale(1.06) rotate(-2deg);
            box-shadow: 14px 14px 0 rgba(0, 0, 0, 0.7);
        }

        .plus-btn:active {
            transform: scale(0.92) rotate(1deg);
        }

        .step-outside {
            position: absolute;
            top: 34px;
            left: -78px;
            z-index: 2;
            color: rgba(255, 255, 255, 0.75);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 170px;
            font-weight: 400;
            letter-spacing: -6px;
            line-height: 0.82;
            text-transform: uppercase;
            user-select: none;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }

        .footsteps-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            font-size: 60px;
        }

        .gif-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .chaos-gif {
            position: absolute;
            object-fit: cover;
            border: 3px solid #000;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.45);
            opacity: 0.92;
        }

        .spin-gif {
            position: fixed;
            left: 24px;
            top: 18px;
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid #000;
            border-radius: 50%;
            z-index: 2;
            opacity: 0.88;
            animation: spin360 2.4s linear infinite;
            pointer-events: none;
        }

        .reels-panel {
            position: fixed;
            right: 12px;
            top: 12px;
            width: 190px;
            height: 88vh;
            border: 4px solid #000;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            z-index: 4;
            display: flex;
            flex-direction: column;
        }

        .reels-title {
            background: #ff006e;
            border-bottom: 3px solid #000;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            padding: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .reels-feed {
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .reel-item {
            border: 2px solid #fff;
            background: #111;
            padding: 4px;
        }

        .reel-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .reel-item p {
            font-size: 11px;
            line-height: 1.2;
            margin-top: 4px;
            color: #ffe66d;
        }

        .mlg-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 8;
            overflow: hidden;
        }

        .mlg-text {
            position: absolute;
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            animation: popOut 0.6s ease-out forwards;
        }

        .flash {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            z-index: 7;
            pointer-events: none;
            opacity: 0;
        }

        .flash.active {
            animation: quickFlash 0.2s linear;
        }

        .footstep {
            position: absolute;
            opacity: 0.8;
            animation: fadeIn 0.3s ease-in;
        }

        .nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 30px;
            background-color: #ffea00;
            color: #000;
            border: 3px solid #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.6);
        }

        @keyframes mlgShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(7px, -5px); }
            50% { transform: translate(-7px, 4px); }
            75% { transform: translate(5px, 6px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes popOut {
            0% {
                opacity: 0;
                transform: scale(0.4) rotate(-8deg);
            }
            30% {
                opacity: 1;
                transform: scale(1.15) rotate(3deg);
            }
            100% {
                opacity: 0;
                transform: scale(1) translateY(-35px);
            }
        }

        @keyframes quickFlash {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes spin360 {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 0.8;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <a href="layout.html" class="nav-btn">← HOME</a>

    <img
        class="spin-gif"
        src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif"
        alt="spinning meme gif"
    >

    <div class="gif-layer" id="gifLayer"></div>
    <div class="flash" id="flash"></div>
    <div class="mlg-overlay" id="mlgOverlay"></div>
    <div class="footsteps-container" id="footsteps"></div>

    <aside class="reels-panel" aria-label="Reels sidebar">
        <div class="reels-title">Reels</div>
        <div class="reels-feed" id="reelsFeed"></div>
    </aside>

    <div class="counter-label">Step Counter</div>
    <div class="count-display" id="count">0</div>
    <div class="step-unit">steps</div>
    <div class="step-cluster" id="stepCluster">
        <button class="plus-btn" id="plusBtn" onclick="moveAndIncrement()" aria-label="Add one step">+</button>
        <div class="step-outside">STEP</div>
    </div>

    <script>
        let count = 0;
        let audioCtx;
        let masterGain;
        const gifUrls = [
            'https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif',
            'https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif',
            'https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif',
            'https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif',
            'https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif'
        ];
        const reelCaptions = [
            'POV: 3am step grind',
            'core cardio cinema',
            'one tap one aura',
            'certified hallway walk',
            'npc marathon clips'
        ];
        const mlgPhrases = [
            'MLG',
            '420 BLAZE',
            'NOSCOPE',
            'TACTICAL STEP',
            'DORITO MODE'
        ];

        function moveAndIncrement() {
            count++;
            updateDisplay();
            moveButton();
            addFootstep();
            doMlgEffects();
            playDubstepHit();

            if (Math.random() < 0.4) {
                addRandomGif();
            }
        }

        function initAudio() {
            if (audioCtx) {
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.78;
            masterGain.connect(audioCtx.destination);
        }

        function playDubstepHit() {
            initAudio();

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const sub = audioCtx.createOscillator();
            const distortion = audioCtx.createWaveShaper();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();

            distortion.curve = makeDistortionCurve(260);
            distortion.oversample = '4x';

            osc.type = 'sawtooth';
            sub.type = 'square';
            osc.frequency.setValueAtTime(170, now);
            osc.frequency.exponentialRampToValueAtTime(68, now + 0.2);
            sub.frequency.setValueAtTime(52, now);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3200, now);
            filter.frequency.exponentialRampToValueAtTime(520, now + 0.18);

            gain.gain.setValueAtTime(0.001, now);
            gain.gain.exponentialRampToValueAtTime(0.65, now + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.26);

            osc.connect(distortion);
            sub.connect(distortion);
            distortion.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            osc.start(now);
            sub.start(now);
            osc.stop(now + 0.28);
            sub.stop(now + 0.28);
        }

        function makeDistortionCurve(amount) {
            const samples = 44100;
            const curve = new Float32Array(samples);
            const deg = Math.PI / 180;

            for (let i = 0; i < samples; i++) {
                const x = (i * 2) / samples - 1;
                curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
            }

            return curve;
        }

        function doMlgEffects() {
            const body = document.body;
            const flash = document.getElementById('flash');
            const mlgOverlay = document.getElementById('mlgOverlay');
            const phrase = document.createElement('div');

            phrase.className = 'mlg-text';
            phrase.textContent = mlgPhrases[Math.floor(Math.random() * mlgPhrases.length)];
            phrase.style.left = Math.floor(Math.random() * Math.max(120, window.innerWidth - 260)) + 'px';
            phrase.style.top = Math.floor(Math.random() * Math.max(80, window.innerHeight - 160)) + 'px';
            phrase.style.color = ['#ff3d00', '#00eaff', '#fff200', '#7dff00'][Math.floor(Math.random() * 4)];

            mlgOverlay.appendChild(phrase);
            if (mlgOverlay.children.length > 18) {
                mlgOverlay.removeChild(mlgOverlay.firstChild);
            }

            body.classList.remove('shake');
            void body.offsetWidth;
            body.classList.add('shake');

            flash.classList.remove('active');
            void flash.offsetWidth;
            flash.classList.add('active');

            setTimeout(() => {
                phrase.remove();
                body.classList.remove('shake');
            }, 600);
        }

        function addRandomGif() {
            const gifLayer = document.getElementById('gifLayer');
            const gif = document.createElement('img');
            gif.className = 'chaos-gif';
            gif.src = gifUrls[Math.floor(Math.random() * gifUrls.length)];
            gif.alt = 'random chaos gif';

            const size = Math.floor(Math.random() * 90) + 90;
            gif.style.width = size + 'px';
            gif.style.height = size + 'px';
            gif.style.left = Math.floor(Math.random() * (window.innerWidth - size)) + 'px';
            gif.style.top = Math.floor(Math.random() * (window.innerHeight - size)) + 'px';
            gif.style.transform = 'rotate(' + (Math.random() * 30 - 15) + 'deg)';

            gifLayer.appendChild(gif);

            if (gifLayer.children.length > 14) {
                gifLayer.removeChild(gifLayer.firstChild);
            }
        }

        function seedRandomGifs() {
            for (let i = 0; i < 6; i++) {
                addRandomGif();
            }
        }

        function initReels() {
            const reelsFeed = document.getElementById('reelsFeed');

            for (let i = 0; i < 12; i++) {
                const item = document.createElement('div');
                item.className = 'reel-item';

                const img = document.createElement('img');
                img.src = gifUrls[i % gifUrls.length];
                img.alt = 'reel clip ' + (i + 1);

                const caption = document.createElement('p');
                caption.textContent = reelCaptions[i % reelCaptions.length];

                item.appendChild(img);
                item.appendChild(caption);
                reelsFeed.appendChild(item);
            }

            setInterval(() => {
                reelsFeed.scrollTop += 1;

                if (reelsFeed.scrollTop >= reelsFeed.scrollHeight - reelsFeed.clientHeight - 1) {
                    reelsFeed.scrollTop = 0;
                }
            }, 30);
        }

        function addFootstep() {
            const footstepsContainer = document.getElementById('footsteps');
            const footstep = document.createElement('div');
            footstep.className = 'footstep';
            footstep.textContent = '👣';
            
            const randomX = Math.random() * (window.innerWidth - 60);
            const randomY = Math.random() * (window.innerHeight - 60);
            
            footstep.style.left = randomX + 'px';
            footstep.style.top = randomY + 'px';
            
            footstepsContainer.appendChild(footstep);
        }

        function moveButton() {
            const cluster = document.getElementById('stepCluster');
            const clusterWidth = 220;
            const clusterHeight = 252;
            const maxX = window.innerWidth - clusterWidth;
            const maxY = window.innerHeight - clusterHeight;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            cluster.style.left = randomX + 'px';
            cluster.style.top = randomY + 'px';
        }

        function updateDisplay() {
            document.getElementById('count').textContent = count;
        }

        // Initialize button at random position
        window.addEventListener('load', () => {
            moveButton();
            seedRandomGifs();
            initReels();
        });
    </script>
</body>
</html>
