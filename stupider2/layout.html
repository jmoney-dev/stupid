        function doPan(e) {

        function initAudio() {
            if (audioCtx) {
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.78;
            masterGain.connect(audioCtx.destination);
        }

        function playDubstepHit() {
            initAudio();

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const sub = audioCtx.createOscillator();
            const distortion = audioCtx.createWaveShaper();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();

            distortion.curve = makeDistortionCurve(260);
            distortion.oversample = '4x';

            osc.type = 'sawtooth';
            sub.type = 'square';
            osc.frequency.setValueAtTime(170, now);
            osc.frequency.exponentialRampToValueAtTime(68, now + 0.2);
            sub.frequency.setValueAtTime(52, now);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3200, now);
            filter.frequency.exponentialRampToValueAtTime(520, now + 0.18);

            gain.gain.setValueAtTime(0.001, now);
            gain.gain.exponentialRampToValueAtTime(0.65, now + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.26);

            osc.connect(distortion);
            sub.connect(distortion);
            distortion.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            osc.start(now);
            sub.start(now);
            osc.stop(now + 0.28);
            sub.stop(now + 0.28);
        }

        function makeDistortionCurve(amount) {
            const samples = 44100;
            const curve = new Float32Array(samples);
            const deg = Math.PI / 180;

            for (let i = 0; i < samples; i++) {
                const x = (i * 2) / samples - 1;
                curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
            }

            return curve;
        }

            const footstep = document.createElement('div');
            footstep.className = 'footstep';
            footstep.textContent = '👣';
            
            const randomX = Math.random() * (window.innerWidth - 60);
            const randomY = Math.random() * (window.innerHeight - 60);
            
            footstep.style.left = randomX + 'px';
            footstep.style.top = randomY + 'px';
            
            footstepsContainer.appendChild(footstep);
        }

        function moveButton() {
            const cluster = document.getElementById('stepCluster');
            const clusterWidth = 220;
            const clusterHeight = 252;
            const maxX = window.innerWidth - clusterWidth;
            const maxY = window.innerHeight - clusterHeight;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            cluster.style.left = randomX + 'px';
            cluster.style.top = randomY + 'px';
        }

        function updateDisplay() {
            document.getElementById('count').textContent = count;
        }

        // Initialize button at random position
        window.addEventListener('load', () => {
            moveButton();
            seedRandomGifs();
            initReels();
        });
    </script>
</body>
