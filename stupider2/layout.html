<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Counter & Location History</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #b584e5 100%);
            background-size: 400% 400%;
            animation: stupidBgShift 8s ease infinite, stupidBounce 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            flex-direction: column;
            gap: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(255, 100, 150, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(100, 200, 255, 0.3) 0%, transparent 50%);
            animation: stupidRotate 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes stupidBgShift {
            0% {
                background-position: 0% 50%;
                filter: hue-rotate(0deg);
            }
            25% {
                background-position: 100% 50%;
                filter: hue-rotate(45deg);
            }
            50% {
                background-position: 100% 100%;
                filter: hue-rotate(90deg);
            }
            75% {
                background-position: 0% 100%;
                filter: hue-rotate(45deg);
            }
            100% {
                background-position: 0% 50%;
                filter: hue-rotate(0deg);
            }
        }

        @keyframes stupidRotate {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.2);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        @keyframes stupidBounce {
            0%, 100% {
                transform: scaleY(1);
            }
            50% {
                transform: scaleY(1.05);
            }
        }

        .count-display {
            font-size: 80px;
            font-weight: bold;
            color: white;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .counter-label {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .step-unit {
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: -24px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .plus-btn {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            font-size: 100px;
            background-color: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .plus-btn:hover {
            background-color: #5568d3;
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .plus-btn:active {
            transform: scale(0.95);
        }

        .footsteps-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            font-size: 60px;
        }

        .footstep {
            position: absolute;
            opacity: 0.8;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 0.8;
                transform: scale(1);
            }
        }

        .tab-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .tab-btn.active {
            background-color: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
            position: relative;
            z-index: 5;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #map {
            width: 600px;
            height: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            background-color: #e8f4f8;
            border: 3px solid #667eea;
        }

        .map-controls {
            display: flex;
            gap: 10px;
            z-index: 10;
            position: relative;
        }

        .map-control-btn {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .map-control-btn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
        }

        .map-control-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="footsteps-container" id="footsteps"></div>
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('counter')">Step Counter</button>
        <button class="tab-btn" onclick="switchTab('location')">Location History</button>
    </div>

    <div id="counter-tab" class="tab-content active">
        <div class="counter-label">Step Counter</div>
        <div class="count-display" id="count">0</div>
        <div class="step-unit">steps</div>
        <button class="plus-btn" id="plusBtn" onclick="moveAndIncrement()" aria-label="Add one step">STEP</button>
    </div>

    <div id="location-tab" class="tab-content">
        <div class="counter-label">Location History</div>
        <canvas id="map"></canvas>
        <div class="map-controls">
            <button class="map-control-btn" onclick="zoomIn()">🔍+ Zoom In</button>
            <button class="map-control-btn" onclick="zoomOut()">🔍- Zoom Out</button>
            <button class="map-control-btn" onclick="centerOnLocation()">📍 Center</button>
        </div>
    </div>

    <script>
        let count = 0;
        let canvas = null;
        let ctx = null;
        let userLocation = null;
        let mapZoom = 1;
        let panX = 0;
        let panY = 0;

        function switchTab(tabName) {
            // Hide all tabs
            document.getElementById('counter-tab').classList.remove('active');
            document.getElementById('location-tab').classList.remove('active');
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            if (tabName === 'counter') {
                document.getElementById('counter-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else if (tabName === 'location') {
                document.getElementById('location-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                if (!canvas) {
                    initMap();
                } else {
                    drawMap();
                }
            }
        }

        function initMap() {
            canvas = document.getElementById('map');
            ctx = canvas.getContext('2d');
            canvas.width = 600;
            canvas.height = 500;

            // Get user's location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        drawMap();
                        
                        // Allow mouse panning
                        canvas.addEventListener('mousedown', startPan);
                        canvas.addEventListener('mousemove', doPan);
                        canvas.addEventListener('mouseup', endPan);
                    },
                    (error) => {
                        console.log('Location access denied, using default');
                        userLocation = { lat: 40.7128, lng: -74.0060 };
                        drawMap();
                    }
                );
            }
        }

        let isPanning = false;
        let lastX = 0;
        let lastY = 0;

        function startPan(e) {
            isPanning = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }

        function doPan(e) {
            if (!isPanning) return;
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            panX += deltaX;
            panY += deltaY;
            lastX = e.clientX;
            lastY = e.clientY;
            drawMap();
        }

        function endPan() {
            isPanning = false;
        }

        function drawMap() {
            if (!ctx || !userLocation) return;

            // Clear canvas
            ctx.fillStyle = '#e8f4f8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#d0e8f2';
            ctx.lineWidth = 1;
            const gridSize = 50 * mapZoom;
            for (let x = panX % gridSize; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = panY % gridSize; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw some random buildings/streets as "surroundings"
            ctx.fillStyle = '#b0d4e3';
            for (let i = 0; i < 15; i++) {
                const x = (Math.sin(i * 123.456) * 300 + canvas.width / 2 + panX) % canvas.width;
                const y = (Math.cos(i * 789.012) * 250 + canvas.height / 2 + panY) % canvas.height;
                const w = (Math.sin(i * 345.678) * 30 + 40) * mapZoom;
                const h = (Math.cos(i * 567.890) * 30 + 40) * mapZoom;
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
            }

            // Draw user location marker
            const centerX = canvas.width / 2 + panX;
            const centerY = canvas.height / 2 + panY;
            
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 12 * mapZoom, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 6 * mapZoom, 0, Math.PI * 2);
            ctx.fill();

            // Draw coordinates
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.fillText(`Lat: ${userLocation.lat.toFixed(4)}`, 10, 25);
            ctx.fillText(`Lng: ${userLocation.lng.toFixed(4)}`, 10, 45);
            ctx.fillText(`Zoom: ${mapZoom.toFixed(1)}x`, 10, 65);
        }

        function zoomIn() {
            mapZoom = Math.min(mapZoom + 0.2, 3);
            if (canvas) drawMap();
        }

        function zoomOut() {
            mapZoom = Math.max(mapZoom - 0.2, 0.5);
            if (canvas) drawMap();
        }

        function centerOnLocation() {
            panX = 0;
            panY = 0;
            mapZoom = 1;
            if (canvas) drawMap();
        }

        function moveAndIncrement() {
            count++;
            updateDisplay();
            moveButton();
            addFootstep();
        }

        function addFootstep() {
            const footstepsContainer = document.getElementById('footsteps');
            const footstep = document.createElement('div');
            footstep.className = 'footstep';
            footstep.textContent = '👣';
            
            const randomX = Math.random() * (window.innerWidth - 60);
            const randomY = Math.random() * (window.innerHeight - 60);
            
            footstep.style.left = randomX + 'px';
            footstep.style.top = randomY + 'px';
            
            footstepsContainer.appendChild(footstep);
        }

        function moveButton() {
            const btn = document.getElementById('plusBtn');
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 200;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function updateDisplay() {
            document.getElementById('count').textContent = count;
        }

        // Initialize button at random position
        window.addEventListener('load', moveButton);
    </script>
</body>
</html>
